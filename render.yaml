services:
  - type: web
    name: al-ihsan-charity
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_STORAGE_DIR
        value: /tmp/al-ihsan
      - key: EMAIL_PROVIDER
        value: local-outbox
      - key: MTN_MOMO_ENABLED
        value: "false"
      - key: MTN_MOMO_BASE_URL
        value: https://sandbox.momodeveloper.mtn.com
      - key: MTN_MOMO_TARGET_ENVIRONMENT
        value: sandbox
      - key: MTN_MOMO_CURRENCY
        value: EUR
      - key: SETTLEMENT_ACCOUNT_NAME
        value: AL-IHSAN CHARITY FOUNDATION
      - key: SETTLEMENT_BANK_NAME
        value: Absa Bank Uganda
      - key: SETTLEMENT_CURRENCY
        value: UGX
      - key: SETTLEMENT_REFERENCE_PREFIX
        value: AICF-DONATION
      - key: AIRTEL_ENABLED
        value: "false"
      - key: AIRTEL_PROVIDER
        value: Manual Airtel Money
      - key: PAYMENT_PROVIDER
        value: not configured
      - key: IPINFO_TOKEN
        sync: false
      - key: ANALYTICS_SALT
        sync: false
